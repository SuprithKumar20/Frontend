<!-- EVENT BUBBLING:
---------------
Event bubbling is a mechanism in JS where an event starts from the deepest target element means the event trigger first on the child
elemntnor clicked element and then move to the parent elemntss

In event bubbling event direction will be from child to parent 

        -WHY does event bubbling happens
-  JS uses event propagation
-  makes event delegation possible
-  reduces number of event listeners in the application
-  improves performance of the application  -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #parent{
            width: 100px;
            height: 200px;
            padding:50px;
            border:5px solid blue;
        }
    </style>
</head>
<body>
    <div id='parent'>
        <button id="child">Button</button>
    </div>

    <script>
        document.getElementById('parent').addEventListener('click',function(){
            alert("parent clicked")
        })
        event.stopPropagation() // to stop event bubbling
        document.getElementById('child').addEventListener('click',function(){
            alert('child clicked')
        })
        
    </script>
</body>
</html>
