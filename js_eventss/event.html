    <!-- onFocus
the focus event listener in JavaScript is triggered when an element gains focus usually through keyboard navigation (like pressing tab button)
or when clicked. -->

    <input type="text" id="myinput" onfocus="focus()">
    <script>
        function focus() {
            let inputref = document.getElementById("myinput")
            inputref.style.border = "2px slid green"
            inputref.style.backgroundColor = 'red'
        }
