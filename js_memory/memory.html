                                <!-- WEB STORAGE
Web Storage allows browsers to store data on the client side (user's browsers)
types:
- local storage
- session storage

LOCAL STORAGE:
- Local Storage is a type of browser storage that allows yout to store key calue pairs in the browser.
- the data is stored even when the broswser is closed and reopened.
- Shared across tabs. -->

<!-- SESSION STORAGE:
- Session Storage on the other hand is similiar to local Storage but the data is only stored for the duration of the user's session
- Stores data only for one browser session.
- this means that the data is lost when the tab/window is close
- only current tab -->
