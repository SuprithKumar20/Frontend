
<!-- Event delegation is a technique in JS where instead od adding event listeners to individual child element ,we can add a single event
listener to a parent elemnent -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="parent">
        <button class="btn" >click1</button>
        <button class="btn" >click2</button>
        <button class="btn" >click3</button>
    </div>

    <script>
        let parent=document.getElementById('parent')
        parent.addEventListener('click', function(e){
            if( e.target.classList.contains('btn')){
                alert(e.target.innerText)
            }
        })
        
     
    </script>

</body>
